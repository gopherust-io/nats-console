name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Deny by default; each job declares least privilege below.
permissions: {}

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: ./...
      - name: Unit tests
        run: make test-unit
      - name: Build server
        run: go build -o /dev/null ./cmd/server

  web:
    name: Web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint, typecheck, and build
        run: npm run lint && npm run typecheck && npm run build

  regression:
    name: Regression (${{ matrix.suite }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: true
      matrix:
        suite: [integration, contract, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run ${{ matrix.suite }} tests
        run: make test-${{ matrix.suite }}

  race-live:
    name: Race (live WebSocket)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Race detector (live WebSocket)
        run: go test -race -count=1 -tags=integration ./internal/live/... ./tests/integration/... -run TestLiveWS

  performance:
    name: Performance baseline
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install vegeta
        run: go install github.com/tsenart/vegeta@latest
      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: Start stack
        run: docker compose up --build -d
      - name: Wait for health
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/api/health && exit 0
            sleep 5
          done
          docker compose logs console
          exit 1
      - name: Performance baseline
        run: bash ./tests/performance/load.sh

  ci-success:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [go, web, regression, race-live]
    if: always()
    permissions: {}
    steps:
      - name: Verify required jobs
        run: |
          check() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ]; then
              echo "Required job '$name' did not succeed (result: $result)"
              exit 1
            fi
          }

          check "Go" "${{ needs.go.result }}"
          check "Web" "${{ needs.web.result }}"
          check "Regression" "${{ needs.regression.result }}"

          if [ "${{ github.event_name }}" = "push" ]; then
            check "Race (live WebSocket)" "${{ needs.race-live.result }}"
          elif [ "${{ needs.race-live.result }}" != "skipped" ]; then
            echo "Race job should be skipped on pull requests (result: ${{ needs.race-live.result }})"
            exit 1
          fi

          echo "All required CI checks passed."
