stages:
  - test
  - build

variables:
  GO_VERSION: "1.26"
  NODE_VERSION: "22"

.test-base:
  image: golang:${GO_VERSION}
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""

test-go:
  extends: .test-base
  script:
    - go test ./...

test-web:
  image: node:${NODE_VERSION}-alpine
  script:
    - cd web && npm install && npm run build

lint-go:
  extends: .test-base
  script:
    - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
    - golangci-lint run ./...
  allow_failure: true

docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker build -t nats-consol:${CI_COMMIT_SHORT_SHA} .
  rules:
    - if: $CI_COMMIT_BRANCH
