apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nats-consol.fullname" . }}-config
  labels:
    {{- include "nats-consol.labels" . | nindent 4 }}
data:
  NATS_URL: {{ .Values.config.natsUrl | quote }}
  NATS_MONITORING_URL: {{ .Values.config.monitoringUrl | quote }}
  ADMIN_USERNAME: {{ .Values.config.adminUsername | quote }}
  DEFAULT_CLUSTER_NAME: {{ .Values.config.defaultClusterName | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.config.corsAllowedOrigins | quote }}
  OIDC_ISSUER: {{ .Values.config.oidcIssuer | quote }}
  OIDC_CLIENT_ID: {{ .Values.config.oidcClientId | quote }}
  OIDC_REDIRECT_URL: {{ .Values.config.oidcRedirectUrl | quote }}
