apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nats-consol.fullname" . }}-secrets
  labels:
    {{- include "nats-consol.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "secrets.databaseUrl is required" .Values.secrets.databaseUrl | quote }}
  ENCRYPTION_KEY: {{ required "secrets.encryptionKey is required" .Values.secrets.encryptionKey | quote }}
  SESSION_SECRET: {{ default .Values.secrets.encryptionKey .Values.secrets.sessionSecret | quote }}
  ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | quote }}
  {{- if .Values.env.OIDC_ENABLED }}
  OIDC_CLIENT_SECRET: {{ .Values.secrets.oidcClientSecret | quote }}
  {{- end }}
