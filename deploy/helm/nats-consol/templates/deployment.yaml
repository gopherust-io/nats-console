apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nats-consol.fullname" . }}
  labels:
    {{- include "nats-consol.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "nats-consol.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nats-consol.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: nats-consol
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "nats-consol.fullname" . }}-config
            - secretRef:
                name: {{ include "nats-consol.fullname" . }}-secrets
          env:
            - name: HTTP_ADDR
              value: ":8080"
            - name: STATIC_DIR
              value: /app/web
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
