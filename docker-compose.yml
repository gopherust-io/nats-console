services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: natsconsol
      POSTGRES_PASSWORD: natsconsol
      POSTGRES_DB: natsconsol
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U natsconsol"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.11-alpine
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "--http_port=8222"
      - "--name=nats-consol-demo"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  console:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://natsconsol:natsconsol@postgres:5432/natsconsol?sslmode=disable
      NATS_URL: nats://nats:4222
      NATS_MONITORING_URL: http://nats:8222
      HTTP_ADDR: ":8080"
      STATIC_DIR: /app/web
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      AUTH_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

volumes:
  nats-data:
  postgres-data:
