<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NATS Consol</title>
    <script>
      (function () {
        var t = localStorage.getItem("nats-consol-theme");
        var themes = ["dark","light","nord","dracula","solarized","midnight","catppuccin","latte","gruvbox","tokyo","onedark","rosepine","dawn","forest","ocean","graphite","monokai","github","amber","crimson"];
        if (!t || themes.indexOf(t) === -1) {
          t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
